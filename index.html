<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Trädgårdsservice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,255,0,0.1);
        }
        h1 { color: #4CAF50; font-size: 2.5rem; }
        .price-box {
            background: #2a2a2a;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 5px solid #4CAF50;
            text-align: left;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 15px 32px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover { background-color: #45a049; }
        input {
            width: 80px;
            padding: 8px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hjälp i Trädgården! 🌿</h1>
    <p>Behöver du hjälp med trädgården? Jag fixar det snabbt och smidigt!</p>

    <div class="price-box">
        <h3>✂️ Trimma trädgården</h3>
        <p>Pris: 20 kr per 10 meter</p>
    </div>

    <div class="price-box">
        <h3>🌱 Rensa ogräs</h3>
        <p>Pris: 50 kr för 15 meter</p>
    </div>

    <div class="price-box">
        <h3>💧 Vattna växter</h3>
        <p>Pris: 300 kr för ALLA växter (använder ditt vatten)</p>
    </div>

    <!-- Swish-nummer fyller du eller dina föräldrar i här sen -->
    <button class="btn" onclick="alert('Ta en skärmdump på vad du vill ha hjälp med och skicka till mina föräldrar för att boka!')">BOKA HÄR</button>
</div>

</body>
</html>
