<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trädgårdshjälp i Boxholm</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

.container {
    max-width:700px;
    margin:20px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,150,0.2);
}

h1 {
    color:#4CAF50;
    font-size:2.5rem;
}

.badge {
    background:#ff9800;
    padding:5px 15px;
    border-radius:20px;
    color:black;
    font-weight:bold;
    display:inline-block;
    margin-bottom:15px;
}

.box {
    background:#1e1e1e;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    text-align:left;
    border-left:5px solid #4CAF50;
}

input {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:5px;
    border:none;
    background:#333;
    color:white;
}

.total {
    font-size:25px;
    margin-top:15px;
    color:#00ff99;
}

button {
    width:100%;
    padding:18px;
    font-size:20px;
    border:none;
    border-radius:10px;
    margin-top:20px;
    cursor:pointer;
    background:#ff3333;
    color:white;
    font-weight:bold;
}

button:hover {
    background:#ff0000;
}

.success {
    display:none;
    margin-top:20px;
    background:#00c853;
    padding:15px;
    border-radius:10px;
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>🌿 Trädgårdshjälp</h1>
<div class="badge">📍 Endast Boxholm</div>

<p>En enklare och finare trädgård – utan stress!</p>

<!-- NAMN -->
<div class="box">
<h3>👤 Ditt namn</h3>
<input type="text" id="fornamn" placeholder="Förnamn">
<input type="text" id="efternamn" placeholder="Efternamn">
</div>

<!-- ADRESS -->
<div class="box">
<h3>🏡 Adress</h3>
<input type="text" id="adress" placeholder="Ex: Storgatan 12, Boxholm">
</div>

<!-- DATUM -->
<div class="box">
<h3>📅 Datum</h3>
<input type="date" id="datum">
</div>

<!-- TJÄNSTER -->
<div class="box">
<h3>💧 Vattna växter</h3>
<label><input type="checkbox" id="vattna" onchange="rakna()"> 30 kr</label>
</div>

<div class="box">
<h3>🌱 Rensa ogräs (70 kr/timme)</h3>
<input type="number" id="ogras" value="0" min="0" oninput="rakna()">
</div>

<div class="box">
<h3>✂️ Trimma trädgården (50 kr/timme)</h3>
<input type="number" id="trim" value="0" min="0" oninput="rakna()">
</div>

<!-- TOTAL -->
<div class="total">
Totalt: <span id="summa">0</span> kr
</div>

<button onclick="betala()">Betala med Swish</button>

<div class="success" id="klart">
✅ Allt klart! Bokningen skickad!
</div>

</div>

<script>
function rakna(){
    let vattna = document.getElementById("vattna").checked ? 30 : 0;
    let ogras = (document.getElementById("ogras").value || 0) * 70;
    let trim = (document.getElementById("trim").value || 0) * 50;

    let total = vattna + ogras + trim;
    document.getElementById("summa").innerText = total;
}

function betala(){
    let fornamn = document.getElementById("fornamn").value.trim();
    let efternamn = document.getElementById("efternamn").value.trim();
    let adress = document.getElementById("adress").value.toLowerCase();
    let datum = document.getElementById("datum").value;
    let summa = document.getElementById("summa").innerText;

    if(fornamn === "" || efternamn === ""){
        alert("Du måste skriva förnamn och efternamn!");
        return;
    }

    if(!adress.includes("boxholm")){
        alert("Adressen måste vara i Boxholm!");
        return;
    }

    if(datum === ""){
        alert("Välj datum!");
        return;
    }

    if(summa == 0){
        alert("Välj minst en tjänst!");
        return;
    }

    let nummer = "0723782629";

    let message = "Trädgårdshjälp - " + fornamn + " " + efternamn + ", " + datum;

    let swish = "swish://payment?data=" + JSON.stringify({
        version:1,
        payee:{value:nummer},
        amount:{value:parseInt(summa)},
        message:{value:message}
    });

    window.location.href = swish;

    document.getElementById("klart").style.display = "block";
}
</script>

</body>
</html>
